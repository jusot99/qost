name: Build and Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        tool: ["jusotscope"]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller httpx dnspython rich

      - name: Set binary name
        id: names
        shell: bash
        run: |
          OS_SUFFIX="${{ runner.os == 'Windows' && 'win' || runner.os == 'macOS' && 'macos' || 'linux' }}"
          EXE_EXT="${{ runner.os == 'Windows' && '.exe' || '' }}"
          echo "binary=${{ matrix.tool }}-${OS_SUFFIX}${EXE_EXT}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --onefile \
            --name ${{ steps.names.outputs.binary }} \
            --hidden-import dns.asyncresolver \
            --hidden-import dns.asyncquery \
            --hidden-import dns.resolver \
            --hidden-import dns.zone \
            --hidden-import dns.query \
            --hidden-import httpx \
            --hidden-import rich \
            src/jusotscope/__main__.py

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.names.outputs.binary }}
          generate_release_notes: ${{ runner.os == 'Linux' }}
        continue-on-error: true
