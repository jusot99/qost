name: Build and Release

on:
  push:
    branches: [main]
    paths: [pyproject.toml, .github/workflows/release.yml]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: echo "version=v$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" --repo ${{ github.repository }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.exists == 'false'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        tool: ["jusotscope"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller httpx dnspython rich ldap3

      - name: Set binary name
        id: names
        shell: bash
        run: |
          OS="${{ runner.os }}"
          if [ "$OS" = "Windows" ]; then SUFFIX="windows-x86_64.exe"
          elif [ "$OS" = "macOS" ]; then SUFFIX="darwin-arm64"
          else SUFFIX="linux-x86_64"
          fi
          echo "binary=${{ matrix.tool }}-${SUFFIX}" >> $GITHUB_OUTPUT

      - name: Build binary
        shell: bash
        run: |
          pyinstaller --onefile \
            --name ${{ steps.names.outputs.binary }} \
            --hidden-import dns.asyncresolver \
            --hidden-import dns.asyncquery \
            --hidden-import dns.resolver \
            --hidden-import dns.zone \
            --hidden-import dns.query \
            --hidden-import httpx \
            --hidden-import rich \
            --hidden-import ldap3 \
            src/jusotscope/__main__.py

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          files: dist/${{ steps.names.outputs.binary }}
          generate_release_notes: ${{ runner.os == 'Linux' }}
        continue-on-error: true
