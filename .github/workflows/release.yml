name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5

      - name: Bake version and build
        shell: bash
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cat > src/qost/_version.py << EOF
          __version__ = "${VERSION}"
          EOF

          uv sync
          uv run --with pyinstaller pyinstaller --onefile \
            --name qost \
            --hidden-import dns.asyncresolver \
            --hidden-import dns.asyncquery \
            --hidden-import dns.resolver \
            --hidden-import dns.zone \
            --hidden-import dns.query \
            --hidden-import httpx \
            --hidden-import rich \
            --hidden-import ldap3 \
            src/qost/__main__.py

          mkdir -p dist/release

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp dist/qost.exe "dist/release/qost-${VERSION}-${{ matrix.target }}.exe"
            (cd dist/release && 7z a "qost-${VERSION}-${{ matrix.target }}.zip" "qost-${VERSION}-${{ matrix.target }}.exe")
          else
            cp dist/qost "dist/release/qost-${VERSION}-${{ matrix.target }}"
            chmod +x "dist/release/qost-${VERSION}-${{ matrix.target }}"
            tar -C dist/release -czvf "dist/release/qost-${VERSION}-${{ matrix.target }}.tar.gz" "qost-${VERSION}-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: qost-${{ matrix.target }}
          path: |
            dist/release/*.tar.gz
            dist/release/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          files: release/*
