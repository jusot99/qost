name: Bug Report
description: Report a bug in qost
labels: [bug]

body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `qost --version`
      placeholder: e.g. 0.1.4
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run 'qost recon example.com --brute'
        2. ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install method (pip / binary / source)
    validations:
      required: true
