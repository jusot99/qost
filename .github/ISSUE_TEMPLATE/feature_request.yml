name: Feature Request
description: Suggest an idea for qost
labels: [enhancement]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the use case? What's missing?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds you've tried?
